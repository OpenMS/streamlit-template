apiVersion: v1
kind: Secret
metadata:
  name: streamlit-secrets
type: Opaque
stringData:
  # Admin password gates the "Save as Demo" UI. Empty = feature hidden.
  # To enable without touching the repo, patch the live Secret:
  #   kubectl -n openms patch secret <prefix>-streamlit-secrets \
  #     --type=merge -p '{"stringData":{"secrets.toml":"[admin]\npassword = \"<strong-password>\""}}'
  #   kubectl -n openms rollout restart deployment/<prefix>-streamlit
  # To enable by editing this file locally without tracking the change, run:
  #   git update-index --skip-worktree k8s/base/streamlit-secrets.yaml
  # See docs/kubernetes-deployment.md, "Configuring the admin password".
  secrets.toml: |
    [admin]
    password = ""
