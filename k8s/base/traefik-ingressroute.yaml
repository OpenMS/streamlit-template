apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: streamlit-traefik
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: streamlit
          port: 8501
          sticky:
            cookie:
              name: stroute
              httpOnly: true
              sameSite: lax
