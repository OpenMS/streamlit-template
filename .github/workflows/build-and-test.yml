name: Build and Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate base manifests
        run: |
          kubeconform -summary -strict -kubernetes-version 1.28.0 \
            -ignore-filename-pattern 'kustomization.yaml' \
            -ignore-filename-pattern 'traefik-ingressroute.yaml' \
            k8s/base/*.yaml

      - name: Validate kustomized overlay output
        run: |
          kubectl kustomize k8s/overlays/prod/ | \
            kubeconform -summary -strict -kubernetes-version 1.28.0 -skip IngressRoute

  build:
    needs: lint-manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: full
            dockerfile: Dockerfile
          - variant: simple
            dockerfile: Dockerfile_simple
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name (OCI refs must be lowercase)
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.variant }}
            type=ref,event=tag,suffix=-${{ matrix.variant }}
            type=sha,prefix=,suffix=-${{ matrix.variant }}
            type=raw,value=latest,enable=${{ matrix.variant == 'full' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and conditionally push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/cache:${{ matrix.variant }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}/cache:{2},mode=max', env.REGISTRY, env.IMAGE_NAME_LC, matrix.variant) || '' }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Retag for kind (stable local tag)
        run: |
          # load:true above loaded all meta-action tags into local docker.
          # Retag the first one to the stable name the kustomize overlay expects.
          FIRST_TAG=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)
          docker tag "$FIRST_TAG" openms-streamlit:test

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: test-cluster
          config: .github/kind-config.yaml

      - name: Load image into kind cluster
        run: kind load docker-image openms-streamlit:test --name test-cluster

      - name: Install nginx ingress controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=90s

      - name: Deploy with Kustomize
        run: |
          # Filter out Traefik IngressRoute (kind cluster uses nginx) and force imagePullPolicy=Never
          kubectl kustomize k8s/overlays/prod/ | \
            yq 'select(.kind != "IngressRoute")' | \
            sed 's|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|g' | \
            sed 's|storageClassName: cinder-csi|storageClassName: standard|g' > /tmp/manifests.yaml
          for i in 1 2 3 4 5; do
            if kubectl apply -f /tmp/manifests.yaml; then
              echo "Deploy succeeded on attempt $i"
              break
            fi
            echo "Attempt $i failed, retrying in ${i}0s..."
            sleep "${i}0"
          done

      - name: Wait for Redis to be ready
        run: |
          kubectl wait -n openms --for=condition=ready pod -l app=template-app,component=redis --timeout=60s

      - name: Verify Redis Service is reachable
        run: |
          kubectl run redis-test -n openms --image=redis:7-alpine --rm -i --restart=Never -- redis-cli -h template-app-redis.openms.svc.cluster.local ping

      - name: Verify all deployments are available
        run: |
          kubectl wait -n openms --for=condition=available deployment -l app=template-app --timeout=120s || true
          kubectl get pods -n openms -l app=template-app
          kubectl get services -n openms -l app=template-app

      - name: Curl both hostnames via nginx ingress
        run: |
          NGINX_POD=$(kubectl -n ingress-nginx get pod -l app.kubernetes.io/component=controller -o name | head -n 1)
          kubectl -n ingress-nginx port-forward "$NGINX_POD" 8080:80 &
          PF_PID=$!
          trap 'kill "$PF_PID" 2>/dev/null || true' EXIT
          for i in 1 2 3 4 5; do
            sleep 2
            if curl -fsSo /dev/null --max-time 2 http://127.0.0.1:8080/_stcore/health -H "Host: streamlit.openms.example.de"; then
              break
            fi
            echo "port-forward not ready yet, retry $i"
          done
          for host in streamlit.openms.example.de streamlit.openms.example.org; do
            curl -fsS --resolve "$host:8080:127.0.0.1" "http://$host:8080/_stcore/health"
            echo ""
            echo "$host -> 200 OK"
          done

  traefik-integration:
    needs: lint-manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (simple variant; routing is image-agnostic)
        run: docker build -t openms-streamlit:test -f Dockerfile_simple .

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: traefik-test
          config: .github/kind-config.yaml

      - name: Load image into kind cluster
        run: kind load docker-image openms-streamlit:test --name traefik-test

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Traefik via Helm
        run: |
          helm repo add traefik https://traefik.github.io/charts
          helm repo update
          helm install traefik traefik/traefik \
            --namespace traefik --create-namespace \
            --set service.type=ClusterIP
          kubectl -n traefik wait --for=condition=available deployment/traefik --timeout=120s

      - name: Deploy with Kustomize (full manifests, no filter)
        run: |
          kubectl kustomize k8s/overlays/prod/ | \
            sed 's|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|g' | \
            sed 's|storageClassName: cinder-csi|storageClassName: standard|g' > /tmp/manifests.yaml
          for i in 1 2 3 4 5; do
            if kubectl apply -f /tmp/manifests.yaml; then
              echo "Deploy succeeded on attempt $i"
              break
            fi
            echo "Attempt $i failed, retrying in ${i}0s..."
            sleep "${i}0"
          done

      - name: Wait for Redis and deployments to be ready
        run: |
          kubectl wait -n openms --for=condition=ready pod -l app=template-app,component=redis --timeout=60s
          kubectl wait -n openms --for=condition=available deployment -l app=template-app --timeout=120s
          kubectl get pods -n openms -l app=template-app

      - name: Curl both hostnames via Traefik
        run: |
          kubectl -n traefik port-forward svc/traefik 8080:80 &
          PF_PID=$!
          trap 'kill "$PF_PID" 2>/dev/null || true' EXIT
          for i in 1 2 3 4 5; do
            sleep 2
            if curl -fsSo /dev/null --max-time 2 http://127.0.0.1:8080/_stcore/health -H "Host: template.webapps.openms.de"; then
              break
            fi
            echo "port-forward not ready yet, retry $i"
          done
          for host in template.webapps.openms.de template.webapps.openms.org; do
            curl -fsS --resolve "$host:8080:127.0.0.1" "http://$host:8080/_stcore/health"
            echo ""
            echo "$host -> 200 OK"
          done
